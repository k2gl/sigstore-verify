name: Attestation watch

# Watches the public Rekor transparency log for certificates issued to any
# k2gl attest workflow identity. A hit that does not match a release we made
# is the alarm signal for compromised signing credentials. Note: the monitor
# inspects hashedrekord entries, while our own releases land as dsse entries —
# so legitimate releases stay quiet and an unexpected hashedrekord signature
# under our identity is a pure anomaly.

on:
  schedule:
    - cron: '23 6 * * 1' # weekly, Monday 06:23 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  rekor-identity-monitor:
    permissions:
      contents: read
      issues: write
      id-token: write
    uses: sigstore/rekor-monitor/.github/workflows/reusable_monitoring.yml@8e91c03463d757f337bc6fb7d3583ff9df5d203c # main 2026-06-08
    with:
      file_issue: true
      artifact_retention_days: 14
      config: |
        monitoredValues:
          certIdentities:
            - certSubject: https://github\.com/k2gl/[^/]+/\.github/workflows/attest\.yml@.+
              issuers:
                - https://token\.actions\.githubusercontent\.com
