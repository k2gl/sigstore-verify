name: Conformance

on: [push, pull_request]

jobs:
  conformance:
    runs-on: ubuntu-latest
    name: sigstore-conformance

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sodium, openssl
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Make the conformance client executable
        run: chmod +x bin/conformance

      - name: Run sigstore-conformance (verification only)
        uses: sigstore/sigstore-conformance@e2cc8e51870bb9af4e4ae3342e97cf5f7ea2cdd8 # v0.0.28
        with:
          entrypoint: ${{ github.workspace }}/bin/conformance
          skip-signing: true
          environment: production
          skip-cpython-release-tests: true
          # Known gaps tracked for the 1.0.0 conformance-parity release. Patterns use
          # "?" in place of the "[" / "]" of the parametrized test id, because the suite
          # fnmatch-es them against the full node name. Strict xfail: if one of these
          # starts passing, CI fails so the entry can be removed.
          xfail: >-
            test_verify?PATH-wrong-hashedrekord-cert-and-sig_fail?
            test_verify?PATH-invalid-inclusion-proof_fail?
            test_verify?PATH-intoto-missing-inclusion-proof_fail?
            test_verify?PATH-intoto-log-entry-mismatch_fail?
            test_verify?PATH-dsse-mismatch-sig_fail?
            test_verify?PATH-checkpoint-bad-keyhint_fail?
            test_verify?PATH-bundle-with-sct-with-extensions?
            test_verify?PATH-rekor2-happy-path?
            test_verify?PATH-rekor2-timestamp-with-embedded-cert?
            test_verify?PATH-rekor2-timestamp-without-embedded-cert?
            test_verify?PATH-rekor2-timestamp-with-expired-cert-chain?
            test_verify?PATH-rekor2-checkpoint-cosigned?
            test_verify?PATH-rekor2-checkpoint-multiple-cosigs?
            test_verify?PATH-rekor2-checkpoint-origin-not-first?
            test_verify?PATH-rekor2-checkpoint-two-sigs-cosigned?
            test_verify?PATH-rekor2-checkpoint-two-sigs-from-origin?
            test_verify?DIGEST-bundle-with-sct-with-extensions?
            test_verify?DIGEST-intoto-missing-inclusion-proof_fail?
            test_verify?DIGEST-intoto-log-entry-mismatch_fail?
            test_verify?DIGEST-dsse-mismatch-sig_fail?
            test_verify?DIGEST-happy-path-v0.1?
            test_verify?DIGEST-happy-path-v0.2?
            test_verify?DIGEST-happy-path-v0.3?
            test_verify?DIGEST-happy-path-v0.3-new-mediaType?
            test_verify?DIGEST-managed-key-happy-path?
            test_verify?DIGEST-managed-key-and-trusted-root?
            test_verify?DIGEST-rekor2-happy-path?
            test_verify?DIGEST-rekor2-timestamp-with-embedded-cert?
            test_verify?DIGEST-rekor2-timestamp-without-embedded-cert?
            test_verify?DIGEST-rekor2-timestamp-with-expired-cert-chain?
            test_verify?DIGEST-rekor2-checkpoint-cosigned?
            test_verify?DIGEST-rekor2-checkpoint-multiple-cosigs?
            test_verify?DIGEST-rekor2-checkpoint-origin-not-first?
            test_verify?DIGEST-rekor2-checkpoint-two-sigs-cosigned?
            test_verify?DIGEST-rekor2-checkpoint-two-sigs-from-origin?
