name: Conformance

on: [push, pull_request]

jobs:
  conformance:
    runs-on: ubuntu-latest
    name: sigstore-conformance
    permissions:
      id-token: write # the suite needs an OIDC token for the signing tests

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sodium, openssl
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Make the conformance client executable
        run: chmod +x bin/conformance

      - name: Run sigstore-conformance (sign + verify)
        uses: sigstore/sigstore-conformance@21533cde107c734ebc153c3e3a24d75fc9811a36 # v0.0.29
        with:
          entrypoint: ${{ github.workspace }}/bin/conformance
          environment: production
          skip-cpython-release-tests: true
          # Verification cases pass in full; signing cases run keyless against
          # Sigstore staging (Fulcio, Rekor v2, TSA) via bin/conformance sign-bundle.
