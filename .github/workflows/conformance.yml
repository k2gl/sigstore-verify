name: Conformance

on: [push, pull_request]

jobs:
  conformance:
    runs-on: ubuntu-latest
    name: sigstore-conformance

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sodium, openssl
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Make the conformance client executable
        run: chmod +x bin/conformance

      - name: Run sigstore-conformance (verification only)
        uses: sigstore/sigstore-conformance@21533cde107c734ebc153c3e3a24d75fc9811a36 # v0.0.29
        with:
          entrypoint: ${{ github.workspace }}/bin/conformance
          skip-signing: true
          environment: production
          skip-cpython-release-tests: true
          # The verifier passes the suite's verification cases in full, so there are no
          # expected failures: any failing case is a real regression and fails CI.
